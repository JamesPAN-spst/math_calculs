<body>

    <h1>反常积分敛散性：50题过程与细节特训</h1>
    
    <div class="intro-panel">
        <strong>教练导语：</strong> 真正的数学能力不体现在抛硬币猜“收敛/发散”，而体现在你构造试探函数时的眼光、拆分积分区间的直觉，以及验证定理条件时的严谨。这套题将逼迫你思考<strong>“为什么这么做”</strong>以及<strong>“第一步该干什么”</strong>。
    </div>

    <form id="quiz-form">
        <div id="questions-container"></div>
    </form>
    
    <button id="submit-btn" onclick="submitQuiz()">交卷并生成错题与解析</button>

    <div id="result-section">
        <div class="score-display">得分: <span id="score">0</span> / 50</div>
        <div class="score-comment" id="score-comment"></div>
        <h2 style="color: #c0392b; border-bottom: 2px solid #fadbd8; padding-bottom: 10px;">📉 过程漏洞扫描与教练复盘</h2>
        <div id="mistakes-container"></div>
    </div>

    <script>
        const questions = [
            // 第一阶段：比较函数的精准选取 (考察“阶”的洞察力)
            { type: 'section', title: '阶段一：试探函数的精准构造 (选什么比较？)' },
            { q: "使用极限比较判别法研究 \\(\\int_{1}^{+\\infty} \\frac{3x^2 + 5}{x^5 + 2x^2 + 1} dx\\) 的敛散性时，最佳的试探函数 \\(g(x)\\) 是什么？", opts: ["\\(1/x^5\\)", "\\(1/x^2\\)", "\\(1/x^3\\)", "\\(3/x^5\\)"], ans: 2, exp: "抓大头：分子最高阶是 \\(x^2\\)，分母最高阶是 \\(x^5\\)，整体等价于 \\(x^2/x^5 = 1/x^3\\)。常数系数 3 在求极限时不会影响是否等于0或无穷大，选基础的 \\(1/x^3\\) 最简洁。" },
            { q: "要证明 \\(\\int_{1}^{+\\infty} x^{10} e^{-x} dx\\) 收敛，如果你选择极限比较判别法，以下哪个试探函数 \\(g(x)\\) 能帮你顺利得到结论？", opts: ["\\(1/x^{10}\\)", "\\(e^{-x}\\)", "\\(1/x\\)", "\\(1/x^2\\)"], ans: 3, exp: "核心在于指数的强衰减性。你需要选一个已知收敛的无穷积分（如 \\(1/x^2\\)）。极限 \\(\\lim_{x\\to\\infty} \\frac{x^{10}e^{-x}}{1/x^2} = \\lim_{x\\to\\infty} \\frac{x^{12}}{e^x} = 0\\)。既然极限为 0 且分母收敛，原积分必收敛。" },
            { q: "研究瑕积分 \\(\\int_{0}^{1} \\frac{1}{\\sin x + x^2} dx\\) (瑕点为0)，在 \\(x \\to 0^+\\) 时，应将原函数与哪个 \\(g(x)\\) 进行比较？", opts: ["\\(1/x\\)", "\\(1/x^2\\)", "\\(1/x^3\\)", "\\(\\sin x\\)"], ans: 0, exp: "泰勒展开第一项定生死。当 \\(x \\to 0\\) 时，\\(\\sin x \\sim x\\)，所以分母 \\(\\sin x + x^2 \\sim x + x^2 \\sim x\\)（低次项主导）。故与 \\(1/x\\) 比较，结论是发散。" },
            { q: "判断 \\(\\int_{2}^{+\\infty} \\frac{1}{\\ln x} dx\\) 发散，最简单的比较放缩法是利用哪个不等式？", opts: ["\\(\\ln x < x\\) (当 \\(x>0\\))", "\\(\\ln x > x\\)", "\\(\\ln x < e^x\\)", "\\(\\ln x < x^2\\)"], ans: 0, exp: "利用基本不等式 \\(\\ln x < x\\)，取倒数得到 \\(\\frac{1}{\\ln x} > \\frac{1}{x}\\)。因为 \\(\\int 1/x\\) 发散，比它大的原积分自然发散。" },
            { q: "对于 \\(\\int_{1}^{+\\infty} (1 - \\cos \\frac{1}{x}) dx\\)，合适的等价试探函数是？", opts: ["\\(1/x\\)", "\\(1/x^2\\)", "\\(1/x^3\\)", "\\(1/\\sqrt{x}\\)"], ans: 1, exp: "无穷远处 \\(1/x \\to 0\\)，利用等价无穷小 \\(1 - \\cos u \\sim \\frac{1}{2}u^2\\)，所以被积函数等价于 \\(\\frac{1}{2x^2}\\)，阶数为 2，故收敛。" },

            // 第二阶段：极限计算与边界突破 (考查计算扎实度)
            { type: 'section', title: '阶段二：极限计算与边界条件检验 (验证过程严谨性)' },
            { q: "在使用比较判别法处理 \\(\\int_{1}^{+\\infty} \\frac{x^p}{e^x} dx\\) 时，无论 \\(p\\) 取多大的实数，\\(\\lim_{x \\to +\\infty} \\frac{x^p/e^x}{1/x^2}\\) 的结果永远是？", opts: ["\\(p\\)", "1", "0", "\\(+\\infty\\)"], ans: 2, exp: "这是指数函数“降维打击”的核心事实：对任意实数次幂，指数函数的增长速度远超幂函数，极限恒为 0。" },
            { q: "设被积函数非负。若计算出极限 \\(\\lim_{x \\to +\\infty} \\frac{f(x)}{1/x} = 0\\)，你能得出什么结论？", opts: ["\\(\\int f(x)dx\\) 收敛", "\\(\\int f(x)dx\\) 发散", "无法判断敛散性", "原函数趋于0"], ans: 2, exp: "极限为 0 意味着 \\(f(x)\\) 比 \\(1/x\\) 衰减得更快。但它衰减得够不够快（有没有达到 \\(1/x^{1.01}\\) 的程度）是未知的！例如 \\(f(x) = \\frac{1}{x\\ln x}\\)，极限是 0 但积分发散。这是考研常见逻辑陷阱。" },
            { q: "若计算出极限 \\(\\lim_{x \\to +\\infty} \\frac{f(x)}{1/x^2} = +\\infty\\) (且 \\(f(x)>0\\))，你能得出什么结论？", opts: ["收敛", "发散", "无法判断", "条件收敛"], ans: 2, exp: "极限为无穷大，说明 \\(f(x)\\) 比 \\(1/x^2\\) 衰减得慢，或者根本不衰减。但比 \\(1/x^2\\) 慢不代表一定发散，比如 \\(f(x) = 1/x^{1.5}\\) 依然收敛。所以无法判断。" },
            { q: "研究瑕积分 \\(\\int_{0}^{1} \\frac{1}{x^{p-1}} dx\\) 收敛的充要条件是什么？", opts: ["\\(p > 1\\)", "\\(p < 1\\)", "\\(p - 1 < 1\\) 即 \\(p < 2\\)", "\\(p - 1 > 1\\) 即 \\(p > 2\\)"], ans: 2, exp: "瑕积分的 p-判别法要求分母的幂次严格小于 1，即 \\(p - 1 < 1\\)，解得 \\(p < 2\\)。必须与无穷积分的准则区分开！" },
            { q: "在判断 \\(\\int_{1}^{+\\infty} \\frac{\\arctan x}{x^{1.5}} dx\\) 时，为了说明收敛，第一步最佳的放缩是？", opts: ["\\(\\arctan x < x\\)", "\\(\\arctan x < \\pi/2\\)", "\\(\\arctan x > 1\\)", "\\(\\arctan x < 1/x\\)"], ans: 1, exp: "不需要等价无穷小，因为 \\(\\arctan x\\) 在无穷远处是有界的且趋于常数 \\(\\pi/2\\)，直接放缩为常数，问题就变成了 \\(p=1.5\\) 的积分。" },

            // 第三阶段：阿贝尔与狄利克雷的步骤剥离 (条件收敛的心法)
            { type: 'section', title: '阶段三：狄利克雷与阿贝尔的步骤剥离 (条件收敛)' },
            { q: "应用狄利克雷判别法证明 \\(\\int_{1}^{+\\infty} \\frac{\\cos x}{x} dx\\) 收敛。令 \\(f(x) = \\cos x\\), \\(g(x) = 1/x\\)。对于 \\(f(x)\\)，你需要向阅卷人展示的具体证明是？", opts: ["\\(\\lim_{x\\to\\infty} \\cos x = 0\\)", "\\(|\\cos x| \\le 1\\)", "\\(|\\int_1^A \\cos x dx| = |\\sin A - \\sin 1| \\le 2\\) (原函数有界)", "\\(\\cos x\\) 单调递减"], ans: 2, exp: "狄利克雷判别法中，对振荡部分的要求是**“积分有界”**，而不是函数本身有界！你必须写出原函数并证明其有界。" },
            { q: "在上述狄利克雷判别法中，对于 \\(g(x) = 1/x\\)，你需要验证的两个条件是？", opts: ["连续且大于0", "单调且有界", "单调且极限为0", "绝对可积"], ans: 2, exp: "狄利克雷对非振荡项的要求非常苛刻：必须**单调**，并且极限必须为 **0**。单调性在考试时常常需要求导来证明。" },
            { q: "如果要用阿贝尔判别法证明 \\(\\int_{1}^{+\\infty} \\frac{\\sin x}{x} e^{-1/x} dx\\) 收敛，已知 \\(\\int_{1}^{+\\infty} \\frac{\\sin x}{x} dx\\) 收敛，对 \\(g(x) = e^{-1/x}\\) 你需要验证什么？", opts: ["单调且趋于0", "单调且有界", "极限为0", "积分有界"], ans: 1, exp: "阿贝尔判别法的作用是“不破坏原有的收敛性”。所以要求 \\(g(x)\\) 是**单调且有界**的乘子。（此处 \\(g(x)\\) 单调递增趋于 1，有界）。" },
            { q: "在处理更复杂的振荡积分 \\(\\int_{1}^{+\\infty} x^2 \\sin(x^4) dx\\) 时，直接用狄利克雷行不通，标准的操作手法是？", opts: ["利用洛必达法则求极限", "加绝对值放缩", "作变量代换 \\(t = x^4\\) 降阶", "利用泰勒展开"], ans: 2, exp: "遇到频率越来越高的振荡，第一步永远是**降阶代换**。令 \\(t = x^4\\)，则 \\(dt = 4x^3 dx\\)，原式将化为 \\(\\int \\frac{\\sin t}{4 t^{1/4}} dt\\)，此时即可完美适用狄利克雷判别法。" },
            { q: "如果一个瑕积分和无穷积分混合的题目如 \\(\\int_{0}^{+\\infty} \\frac{\\sin x}{x^p} dx\\)，第一步永远应该怎么做？", opts: ["直接使用狄利克雷判别法", "取对数分析", "将其拆分为 \\(\\int_{0}^{1}\\) 和 \\(\\int_{1}^{+\\infty}\\) 分段讨论", "利用分布积分"], ans: 2, exp: "奇点隔离原则。狄利克雷只能处理无穷远，不能处理瑕点；等价无穷小通常用来处理瑕点。必须从中间截断，分别证明两端都收敛。" },

            // 第四阶段：实战综合判断（包含前面的坑点）
            { type: 'section', title: '阶段四：实战综合判定 (35题高强度肌肉记忆)' },
            { q: "积分 \\(\\int_{1}^{+\\infty} \\frac{1}{x^{1.001}} dx\\)", opts: ["收敛", "发散"], ans: 0, exp: "p > 1 收敛" },
            { q: "积分 \\(\\int_{1}^{+\\infty} \\frac{1}{x^{0.999}} dx\\)", opts: ["收敛", "发散"], ans: 1, exp: "p <= 1 发散" },
            { q: "积分 \\(\\int_{2}^{+\\infty} \\frac{1}{x \\ln x} dx\\)", opts: ["收敛", "发散"], ans: 1, exp: "换元后等价于 \\(1/u\\) 积分，发散" },
            { q: "积分 \\(\\int_{2}^{+\\infty} \\frac{1}{x (\\ln x)^2} dx\\)", opts: ["收敛", "发散"], ans: 0, exp: "换元后等价于 \\(1/u^2\\) 积分，收敛" },
            { q: "瑕积分 \\(\\int_{0}^{1} \\frac{1}{x^{0.999}} dx\\) (瑕点在0)", opts: ["收敛", "发散"], ans: 0, exp: "瑕积分要求 p < 1 才收敛" },
            { q: "瑕积分 \\(\\int_{0}^{1} \\frac{1}{x^{1.001}} dx\\) (瑕点在0)", opts: ["收敛", "发散"], ans: 1, exp: "瑕积分要求 p < 1，此处 p>1 故发散" },
            { q: "积分 \\(\\int_{0}^{1} \\frac{1}{\\sqrt{1-x}} dx\\)", opts: ["收敛", "发散"], ans: 0, exp: "瑕点在1，做代换或平移后相当于 p=1/2 < 1 的瑕积分，收敛" },
            { q: "积分 \\(\\int_{0}^{\\pi/2} \\frac{\\cos x}{\\sqrt{x}} dx\\)", opts: ["收敛", "发散"], ans: 0, exp: "瑕点在0，被积函数 \\(\\sim 1/x^{0.5}\\)，收敛" },
            { q: "积分 \\(\\int_{1}^{+\\infty} \\frac{x^3}{x^5 + 2} dx\\)", opts: ["收敛", "发散"], ans: 0, exp: "同阶于 \\(1/x^2\\)，收敛" },
            { q: "积分 \\(\\int_{1}^{+\\infty} \\frac{x^3}{x^4 + 2} dx\\)", opts: ["收敛", "发散"], ans: 1, exp: "同阶于 \\(1/x\\)，发散" },
            { q: "积分 \\(\\int_{1}^{+\\infty} \\frac{\\sqrt{x+1}}{x^2} dx\\)", opts: ["收敛", "发散"], ans: 0, exp: "同阶于 \\(x^{0.5}/x^2 = 1/x^{1.5}\\)，收敛" },
            { q: "积分 \\(\\int_{1}^{+\\infty} \\frac{1}{\\sqrt{x(x+1)(x+2)}} dx\\)", opts: ["收敛", "发散"], ans: 0, exp: "根号内为三次，故分母同阶于 \\(x^{1.5}\\)，收敛" },
            { q: "积分 \\(\\int_{1}^{+\\infty} e^{-2x} dx\\)", opts: ["收敛", "发散"], ans: 0, exp: "基础指数衰减" },
            { q: "积分 \\(\\int_{1}^{+\\infty} x^{2026} e^{-x} dx\\)", opts: ["收敛", "发散"], ans: 0, exp: "指数强衰减秒杀多项式" },
            { q: "积分 \\(\\int_{1}^{+\\infty} e^{-x^2} dx\\)", opts: ["收敛", "发散"], ans: 0, exp: "高斯积分，极强衰减" },
            { q: "积分 \\(\\int_{1}^{+\\infty} \\frac{\\ln x}{x^2} dx\\)", opts: ["收敛", "发散"], ans: 0, exp: "对数增长极慢，选 \\(g(x)=1/x^{1.5}\\) 比较极限为0，收敛" },
            { q: "积分 \\(\\int_{2}^{+\\infty} \\frac{1}{\\ln(x^2)} dx\\)", opts: ["收敛", "发散"], ans: 1, exp: "对数函数远小于 \\(x\\)，故分式远大于 \\(1/x\\)，发散" },
            { q: "积分 \\(\\int_{1}^{+\\infty} \\frac{\\sin x}{x} dx\\)", opts: ["绝对收敛", "条件收敛", "发散"], ans: 1, exp: "经典狄利克雷，条件收敛" },
            { q: "积分 \\(\\int_{1}^{+\\infty} \\frac{\\cos x}{x^3} dx\\)", opts: ["绝对收敛", "条件收敛", "发散"], ans: 0, exp: "加绝对值后放缩为 \\(1/x^3\\) 即可，绝对收敛" },
            { q: "积分 \\(\\int_{1}^{+\\infty} \\sin(x^2) dx\\)", opts: ["绝对收敛", "条件收敛", "发散"], ans: 1, exp: "菲涅尔积分，换元后利用狄利克雷，条件收敛" },
            { q: "积分 \\(\\int_{1}^{+\\infty} \\frac{\\sin x}{\\sqrt{x}} e^{-x} dx\\)", opts: ["绝对收敛", "条件收敛", "发散"], ans: 0, exp: "有指数函数兜底保护，加绝对值放缩后绝对收敛" },
            { q: "积分 \\(\\int_{1}^{+\\infty} \\frac{\\sin^2 x}{x} dx\\)", opts: ["收敛", "发散"], ans: 1, exp: "半角公式展开化为 \\(\\frac{1-\\cos 2x}{2x}\\)。\\(\\cos 2x / x\\) 收敛，但 \\(1/2x\\) 发散，整体发散！" },
            { q: "积分 \\(\\int_{0}^{1} \\frac{1}{\\ln(1+\\sqrt{x})} dx\\)", opts: ["收敛", "发散"], ans: 0, exp: "瑕点在0，等价于 \\(1/x^{0.5}\\)，收敛" },
            { q: "积分 \\(\\int_{0}^{1} \\frac{e^x - 1}{x^{1.5}} dx\\)", opts: ["收敛", "发散"], ans: 0, exp: "瑕点在0，分子等价于 \\(x\\)，整体等价于 \\(1/x^{0.5}\\)，收敛" },
            { q: "积分 \\(\\int_{0}^{1} \\frac{\\cos x}{x} dx\\)", opts: ["收敛", "发散"], ans: 1, exp: "瑕点在0，\\(\\cos 0 = 1\\)，等价于 \\(1/x\\)，发散" },
            { q: "积分 \\(\\int_{0}^{+\\infty} \\frac{x}{1+x^3} \\sin x dx\\)", opts: ["绝对收敛", "条件收敛", "发散"], ans: 0, exp: "无瑕点，无穷远处加绝对值放缩为 \\(1/x^2\\)，绝对收敛" },
            { q: "积分 \\(\\int_{2}^{+\\infty} \\frac{\\sin x}{\\ln x} dx\\)", opts: ["绝对收敛", "条件收敛", "发散"], ans: 1, exp: "用狄利克雷判定收敛。加绝对值后发散，故条件收敛" },
            { q: "积分 \\(\\int_{1}^{+\\infty} (-1)^{[x]} \\frac{1}{x} dx\\) (注:[x]为取整函数)", opts: ["绝对收敛", "条件收敛", "发散"], ans: 1, exp: "分段常数振荡，化为交错级数 \\(1/n\\)，条件收敛" },
            { q: "积分 \\(\\int_{1}^{+\\infty} \\frac{x \\sin x}{x^2+1} dx\\)", opts: ["绝对收敛", "条件收敛", "发散"], ans: 1, exp: "可用狄利克雷证明收敛（注意 \\(x/(x^2+1)\\) 单调降），加绝对值发散" },
            { q: "瑕积分 \\(\\int_{0}^{\\pi/2} \\tan x dx\\)", opts: ["收敛", "发散"], ans: 1, exp: "瑕点在 \\(\\pi/2\\)，等价于 \\(1/(\\pi/2 - x)\\)，p=1发散" },
            { q: "积分 \\(\\int_{0}^{+\\infty} \\frac{\\arctan x}{1+x^2} dx\\)", opts: ["收敛", "发散"], ans: 0, exp: "可直接算出原函数 \\(\\frac{1}{2}(\\arctan x)^2\\)，极限有限，收敛" },
            { q: "积分 \\(\\int_{0}^{+\\infty} \\frac{1}{x^{p} + x^{q}} dx\\) (0 < p < 1 < q)", opts: ["收敛", "发散"], ans: 0, exp: "拆分。在 0 附近由小次幂 p 主导（因为 x趋于0时，小次幂更大），p<1收敛。在无穷远由大次幂 q 主导，q>1收敛。整体收敛。" },
            { q: "积分 \\(\\int_{1}^{+\\infty} x^n e^{-\\sqrt{x}} dx\\) (n>0)", opts: ["收敛", "发散"], ans: 0, exp: "换元或直接阶数估计，指数衰减强于任何次幂，收敛" },
            { q: "积分 \\(\\int_{0}^{+\\infty} e^{-x} \\cos(e^x) dx\\)", opts: ["收敛", "发散"], ans: 0, exp: "直接求出原函数 \\(\\sin(e^x)\\)，在无穷远处极限不存在，但在原积分前乘了 \\(e^{-x}\\)，换元法 \\(t=e^x\\) 变为 \\(\\int \\cos t / t^2 dt\\)，收敛" },
            { q: "积分 \\(\\int_{0}^{1} \\frac{1}{x - \\sin x} dx\\)", opts: ["收敛", "发散"], ans: 1, exp: "瑕点在0，分母泰勒展开为 \\(x^3/6\\)，等价于 \\(6/x^3\\)，p=3>1，发散" }
        ];

        const form = document.getElementById('questions-container');
        let questionCount = 0;
        
        // 动态渲染所有题目和区段标签
        questions.forEach((q, index) => {
            if (q.type === 'section') {
                form.innerHTML += `<div class="section-title">${q.title}</div>`;
            } else {
                let optionsHtml = '';
                q.opts.forEach((opt, optIndex) => {
                    optionsHtml += `<label><input type="radio" name="q${questionCount}" value="${optIndex}"> ${opt}</label>`;
                });
                form.innerHTML += `
                    <div class="question-card" id="card-${questionCount}">
                        <div class="question-title">第 ${questionCount + 1} 题: ${q.q}</div>
                        <div class="options">${optionsHtml}</div>
                    </div>
                `;
                q.realIndex = questionCount; // 记录题目在可答题中的索引
                questionCount++;
            }
        });

        function submitQuiz() {
            let score = 0;
            let mistakesHtml = '';
            let allAnswered = true;
            let answeredCount = 0;

            questions.forEach((q) => {
                if (q.type === 'section') return;
                
                let idx = q.realIndex;
                const selected = document.querySelector(`input[name="q${idx}"]:checked`);
                const card = document.getElementById(`card-${idx}`);
                
                if (!selected) {
                    allAnswered = false;
                    card.style.borderLeft = "4px solid #f1c40f";
                    card.style.backgroundColor = "#fff9e6";
                } else {
                    answeredCount++;
                    card.style.borderLeft = "4px solid #bdc3c7";
                    card.style.backgroundColor = "white";
                    
                    if (parseInt(selected.value) === q.ans) {
                        score++;
                        card.style.border = "2px solid #2ecc71";
                    } else {
                        card.style.border = "2px solid #e74c3c";
                        mistakesHtml += `
                            <div class="mistake-card">
                                <div class="mistake-header">
                                    <strong>❌ 第 ${idx + 1} 题</strong>
                                </div>
                                <div><strong>考题:</strong> ${q.q}</div>
                                <div style="margin-top: 10px;">
                                    <span style="color:#7f8c8d; text-decoration: line-through;">你的回答: ${q.opts[parseInt(selected.value)]}</span><br>
                                    <strong style="color:#27ae60;">正确答案: ${q.opts[q.ans]}</strong>
                                </div>
                                <div class="explanation"><strong>教练拆解 🛠️：</strong>${q.exp}</div>
                            </div>
                        `;
                    }
                }
            });

            if (!allAnswered) {
                alert(`教练提醒：你只做了 ${answeredCount} 题，还有 ${questionCount - answeredCount} 题没做！注意黄色高亮的题目。静下心来，把它做完！`);
                return;
            }

            document.getElementById('score').innerText = score;
            const mistakesContainer = document.getElementById('mistakes-container');
            const comment = document.getElementById('score-comment');
            
            if (score === questionCount) {
                comment.innerHTML = "<span style='color: #27ae60;'>完美！你的基础和过程严谨度已无可挑剔，准备迎接竞赛的洗礼吧！</span>";
                mistakesContainer.innerHTML = "";
            } else if (score >= 40) {
                comment.innerHTML = "优秀！绝大部分陷阱你都避开了，查漏补缺一下错题即可。";
                mistakesContainer.innerHTML = mistakesHtml;
            } else if (score >= 30) {
                comment.innerHTML = "底子不错，但在过程推理（如判别法条件的验证、极限收敛深度的理解）上还有模糊地带，仔细看教练解析！";
                mistakesContainer.innerHTML = mistakesHtml;
            } else {
                comment.innerHTML = "<span style='color: #c0392b;'>警报响起！基础概念存在较多混淆（尤其是瑕积分与无穷积分的条件反转）。建议先重点看错题本前15题的过程拆解！</span>";
                mistakesContainer.innerHTML = mistakesHtml;
            }

            document.getElementById('result-section').style.display = 'block';
            MathJax.typesetPromise();
            document.getElementById('result-section').scrollIntoView({ behavior: 'smooth' });
            document.getElementById('submit-btn').style.display = 'none';
        }
    </script>
</body>
</html>
