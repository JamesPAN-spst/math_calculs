<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数学分析学习与特训平台</title>
    <style>
        :root {
            --primary-color: #3498db;
            --secondary-color: #2c3e50;
            --accent-color: #1abc9c;
            --bg-color: #f0f2f5;
            --card-bg: #ffffff;
            --text-main: #333333;
            --text-light: #7f8c8d;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 50px;
        }

        h1 {
            color: var(--secondary-color);
            font-size: 2.5em;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }

        .subtitle {
            color: var(--text-light);
            font-size: 1.1em;
        }

        .module-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.3em;
            color: var(--secondary-color);
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 8px;
            margin-bottom: 20px;
            display: inline-block;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
        }

        /* 卡片样式 */
        .card {
            background-color: var(--card-bg);
            border-radius: 10px;
            padding: 25px;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            border-top: 4px solid transparent;
            transition: all 0.3s ease;
            position: relative;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px rgba(0,0,0,0.1);
        }

        .card.exercise { border-top-color: var(--primary-color); }
        .card.method { border-top-color: var(--accent-color); }
        .card.coming-soon { 
            border-top-color: #bdc3c7; 
            cursor: default;
            opacity: 0.8;
        }

        .card.coming-soon:hover {
            transform: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }

        .card-title {
            font-size: 1.25em;
            font-weight: bold;
            color: var(--secondary-color);
        }

        .tag {
            font-size: 0.8em;
            padding: 4px 10px;
            border-radius: 20px;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .tag.exercise { background-color: #ebf5fb; color: var(--primary-color); }
        .tag.method { background-color: #e8f8f5; color: var(--accent-color); }
        .tag.coming-soon { background-color: #f8f9fa; color: #7f8c8d; border: 1px solid #bdc3c7; }

        .card-desc {
            color: var(--text-light);
            font-size: 0.95em;
            flex-grow: 1;
        }

        .card-footer {
            margin-top: 20px;
            font-size: 0.9em;
            font-weight: bold;
            text-align: right;
            color: var(--primary-color);
        }
        
        .card.method .card-footer { color: var(--accent-color); }
        .card.coming-soon .card-footer { color: #bdc3c7; }

    </style>
</head>
<body>

    <div class="container">
        <header>
            <h1>数学分析精练平台</h1>
            <p class="subtitle">化繁为简，构建核心数学直觉</p>
        </header>

        <div class="module-section">
            <div class="section-title">反常积分专题</div>
            <div class="grid">
                
                <!-- 练习模块 -->
                <a href="./exercise.html" class="card exercise">
                    <div class="card-header">
                        <div class="card-title">敛散性：50题特训</div>
                        <span class="tag exercise">练习</span>
                    </div>
                    <div class="card-desc">
                        针对反常积分敛散性判别法的过程与细节，进行高强度的思维与肌肉记忆训练，附带教练级拆解复盘。
                    </div>
                    <div class="card-footer">进入特训 &rarr;</div>
                </a>

                <!-- 方法模块 -->
                <a href="./methods.html" class="card method">
                    <div class="card-header">
                        <div class="card-title">判别法完全指南</div>
                        <span class="tag method">方法</span>
                    </div>
                    <div class="card-desc">
                        从基础柯西准则到高阶狄利克雷/阿贝尔判别法的系统性总结。掌握比较的艺术与“阶”的洞察力。
                    </div>
                    <div class="card-footer">查阅指南 &rarr;</div>
                </a>

            </div>
        </div>

        <div class="module-section">
            <div class="section-title">更多专题 (规划中)</div>
            <div class="grid">
                
                <!-- 预留模块示例 -->
                <div class="card coming-soon">
                    <div class="card-header">
                        <div class="card-title">数项级数敛散性</div>
                        <span class="tag coming-soon">待开发</span>
                    </div>
                    <div class="card-desc">
                        比值法、根值法、交错级数与绝对收敛的系统训练与方法论归纳。
                    </div>
                    <div class="card-footer">敬请期待 ⏳</div>
                </div>

                 <div class="card coming-soon">
                    <div class="card-header">
                        <div class="card-title">多元微积分</div>
                        <span class="tag coming-soon">待开发</span>
                    </div>
                    <div class="card-desc">
                        重积分计算技巧与各类积分换元法的深度强化。
                    </div>
                    <div class="card-footer">敬请期待 ⏳</div>
                </div>

            </div>
        </div>

    </div>

</body>
</html>
